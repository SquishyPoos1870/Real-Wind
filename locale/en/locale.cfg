[mod-name]
real-wind=Real Wind

[mod-description]
real-wind=Adds Nauvis-only forest wind with leaf/debris sweeps, canopy ripple effects, branch shimmer, forest gust wisps, and positional wind whoosh audio. Stand-alone, UPS-friendly, and optionally boosted by Real Rain storms.

[mod-setting-name]
real-wind-intensity=Wind intensity
real-wind-enable-leaves=Enable leaf/debris motes
real-wind-enable-tree-sway=Enable tree wind FX
real-wind-enable-sounds=Enable wind gust sounds
real-wind-sound-volume=Forest wind sound volume
real-wind-apply-surface-wind=Apply real surface wind
real-wind-effect-interval=Effect interval

[mod-setting-description]
real-wind-intensity=Controls wind speed, forest leaf FX, gust strength, and wind audio frequency.
real-wind-enable-leaves=Spawns drifting leaf/debris motes and small leaf sweeps near all tree prototypes on Nauvis.
real-wind-enable-tree-sway=Adds extra branch shimmer, canopy ripple, and forest gust wisps around all tree prototypes on Nauvis. Factorio tree sprites cannot truly bend, so this fakes motion with wind-driven overlay effects.
real-wind-enable-sounds=Adds positional forest wind whooshes from nearby trees during gusts on Nauvis.
real-wind-sound-volume=Master volume multiplier for Real Wind whoosh ambience. Wind audio is emitted from nearby tree positions and fades with distance.
real-wind-apply-surface-wind=Changes Nauvis surface wind so wind-aware smoke follows the current wind direction. Real Rain storms can boost this when both mods are installed.
real-wind-effect-interval=Ticks between visual effect spawn passes. Lower values look denser but cost more UPS.

[string-mod-setting]
real-wind-intensity-subtle=Subtle
real-wind-intensity-balanced=Balanced
real-wind-intensity-strong=Strong
real-wind-intensity-cinematic=Cinematic / AAA

[real-wind]
command-help=Shows Real Wind status.
command-gust-help=Starts a stronger wind gust. Admin only in multiplayer.
message-settings-updated=Real Wind settings updated.
message-status=Real Wind: __1__ | Nauvis only | base wind __2__ | gust wind __3__
message-gust=Real Wind gust triggered on Nauvis.
message-admin-only=Only admins can trigger a Real Wind gust.
